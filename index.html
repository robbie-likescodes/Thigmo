<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thigmo v2</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app-shell">
    <header class="top-bar">
      <div class="brand">🌸 Thigmo</div>
      <div class="scoreboard">
        <span class="pill purple">Purple captures: <strong id="score-purple">0</strong></span>
        <span class="pill orange">Orange captures: <strong id="score-orange">0</strong></span>
      </div>
      <div class="turn-info" id="turn-info">Purple Turn · Move a tile</div>
      <div class="controls-inline">
        <a class="rules-link" href="docs/rules.html" target="_blank" rel="noopener noreferrer">refer to rules</a>
        <button id="undo-btn">Undo Turn</button>
      </div>
    </header>

    <div id="viewport">
      <div class="sun-emblem" aria-hidden="true">
        <span class="sun-core"></span>
        <span class="sun-ray ray-1"></span>
        <span class="sun-ray ray-2"></span>
        <span class="sun-ray ray-3"></span>
        <span class="sun-ray ray-4"></span>
        <span class="sun-ray ray-5"></span>
        <span class="sun-ray ray-6"></span>
        <span class="sun-ray ray-7"></span>
        <span class="sun-ray ray-8"></span>
      </div>
      <div id="mobile-flower-dock" class="mobile-flower-dock" aria-hidden="true">
        <div id="mobile-flower-icon" class="mobile-flower-icon"></div>
      </div>
    </div>

    <aside class="side-panel">
      <section class="card">
        <h3>Game Status</h3>
        <div id="phase-badge" class="phase-badge">Move Phase</div>
        <div id="feedback" class="feedback">Ready.</div>
        <label class="toggle-row" for="show-neutrals-toggle">
          <input id="show-neutrals-toggle" type="checkbox" />
          <span>Show Neutrals</span>
        </label>
      </section>

      <section class="card">
        <h3>Event Log</h3>
        <div id="log"></div>
      </section>

      <p>Version: <code id="build-id">loading…</code></p>
    </aside>
  </div>

  <div id="win-modal" class="win-modal hidden" role="dialog" aria-modal="true" aria-labelledby="win-title">
    <div class="win-modal-card">
      <h2 id="win-title">Purple has prevailed.</h2>
      <p id="win-announcement" class="win-announcement"></p>
      <button id="replay-btn" class="replay-btn">Replay</button>
    </div>
  </div>

  <script src="app.js?v=20260510-botanical-fix1" defer></script>
  <script>
    window.addEventListener('DOMContentLoaded', ()=>{
      const el=document.getElementById('build-id');
      setTimeout(()=>{ el.textContent = window.THIGMO_BUILD || 'unknown'; }, 20);
    });
  </script>
</body>
</html>
